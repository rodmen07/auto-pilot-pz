name: Release

# Trigger a GitHub release whenever a version tag is pushed.
# Tag format: v<semver> — e.g. v1.1.0, v1.2.3-beta1
on:
  push:
    tags:
      - "v*"

jobs:
  # ── CI gate ──────────────────────────────────────────────────────────────────
  # Run the full lint-and-test suite before packaging.  A broken tag cannot
  # produce a release artifact.
  lint-and-test:
    name: CI gate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    name: Package & publish
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify version tag matches mod.info
        run: |
          # Extract the version number from the tag (strip leading 'v' and any
          # build metadata after a hyphen, e.g. v1.1.0 → 1.1, v1.1.0-beta1 → 1.1).
          TAG_VER="${{ github.ref_name }}"
          TAG_VER="${TAG_VER#v}"              # strip leading v
          TAG_MAJOR_MINOR="${TAG_VER%%.*}"   # e.g. "1" from "1.1.0"
          TAG_REST="${TAG_VER#*.}"           # e.g. "1.0" from "1.1.0"
          TAG_MINOR="${TAG_REST%%.*}"        # e.g. "1" from "1.0"
          TAG_DOTVER="${TAG_MAJOR_MINOR}.${TAG_MINOR}"  # e.g. "1.1"

          MOD_VER="$(grep '^modversion=' 42/mod.info | cut -d= -f2 | tr -d '[:space:]')"

          echo "Tag version (major.minor): ${TAG_DOTVER}"
          echo "mod.info modversion:       ${MOD_VER}"

          if [ "${TAG_DOTVER}" != "${MOD_VER}" ]; then
            echo "ERROR: Version mismatch — tag says ${TAG_DOTVER} but 42/mod.info says ${MOD_VER}."
            echo "Update modversion in 42/mod.info before tagging."
            exit 1
          fi
          echo "Version check PASSED: tag and mod.info both report ${MOD_VER}."

      - name: Build mod archive
        run: |
          # Package the 42/ folder (everything the game needs) plus documentation.
          zip -r "AutoPilot-${{ github.ref_name }}.zip" 42/ docs/ CHANGELOG.md

      - name: Verify archive contents
        run: |
          ARCHIVE="AutoPilot-${{ github.ref_name }}.zip"
          echo "=== Archive contents ==="
          unzip -l "${ARCHIVE}"

          # Assert required files are present.
          REQUIRED=(
            "42/mod.info"
            "42/media/lua/client/AutoPilot_Main.lua"
            "42/media/lua/client/AutoPilot_Needs.lua"
            "42/media/lua/client/AutoPilot_Threat.lua"
            "42/media/lua/client/AutoPilot_Inventory.lua"
            "42/media/lua/client/AutoPilot_Medical.lua"
            "42/poster.png"
            "docs/architecture.md"
            "CHANGELOG.md"
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if ! unzip -l "${ARCHIVE}" | grep -q "${f}"; then
              echo "ERROR: Required file missing from archive: ${f}"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "${MISSING}" -gt 0 ]; then
            echo "Archive integrity check FAILED: ${MISSING} required file(s) missing."
            exit 1
          fi

          # Assert dev-only artefacts are NOT bundled.
          DEV_PATTERNS=(".luacheckrc" "tests/" "requirements" ".github" "automate.py"
                        "auto_tune.py" "benchmark.py" "schemas/")
          DEV_FOUND=0
          for pat in "${DEV_PATTERNS[@]}"; do
            if unzip -l "${ARCHIVE}" | grep -q "${pat}"; then
              echo "ERROR: Dev-only file found in archive: ${pat}"
              DEV_FOUND=$((DEV_FOUND + 1))
            fi
          done
          if [ "${DEV_FOUND}" -gt 0 ]; then
            echo "Archive integrity check FAILED: ${DEV_FOUND} dev file(s) accidentally bundled."
            exit 1
          fi

          echo "Archive integrity check PASSED."

      - name: Verify no anthropic import in Python sources
        run: |
          echo "=== Checking for removed anthropic dependency ==="
          if grep -rn --include="*.py" "import anthropic" .; then
            echo "ERROR: 'import anthropic' found — remove the Anthropic SDK dependency."
            exit 1
          fi
          echo "PASSED: no anthropic imports detected."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AutoPilot-${{ github.ref_name }}.zip
          generate_release_notes: true
