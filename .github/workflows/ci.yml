name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Lua and luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Lua lint
        run: luacheck 42/media/lua/client/*.lua --config .luacheckrc

      - name: Static API Guard
        run: |
          echo "=== Static API Guard: checking for deprecated PZ APIs ==="
          DEPRECATED_PATTERNS=(
            ":getHunger()"
            ":getThirst()"
            ":getFatigue()"
            ":getEndurance()"
            "CharacterStats\."
          )
          FOUND=0
          for pattern in "${DEPRECATED_PATTERNS[@]}"; do
            if grep -rn --include="*.lua" -- "$pattern" 42/media/lua/client/; then
              echo "ERROR: Deprecated API pattern found: $pattern"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ "$FOUND" -gt 0 ]; then
            echo "Static API Guard FAILED: $FOUND deprecated pattern(s) detected."
            echo "Use player:getStats():get(CharacterStat.X) instead of direct stat getters."
            exit 1
          fi
          echo "Static API Guard PASSED: no deprecated APIs detected."

      - name: Lua logic tests
        run: |
          for test_file in \
              tests/test_priority_logic.lua \
              tests/test_threat_logic.lua \
              tests/test_medical_logic.lua \
              tests/test_home_map_barricade.lua \
              tests/test_main_logic.lua; do
            echo "=== $test_file ==="
            lua5.1 "$test_file"
          done

      - name: Python tests
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_priority_logic.lua \
            --ignore=tests/test_threat_logic.lua \
            --ignore=tests/test_medical_logic.lua \
            --ignore=tests/test_home_map_barricade.lua \
            --ignore=tests/test_main_logic.lua \
            --ignore=tests/lua_mock_pz.lua
